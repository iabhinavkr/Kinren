<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevents AI scrapers from indexing or training on this page -->
    <meta name="robots" content="noai, noimageai">
    <title>All-in-One Time Dashboard</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --secondary: #50e3c2;
            --danger: #ff4a5a;
            --text-main: #333333;
            --text-muted: #777777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0 0 20px 0;
            color: var(--text-main);
            user-select: none; /* Prevents text highlighting */
        }

        /* Top Bar Info */
        .contact-bar {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px 10px;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 20px;
        }

        .contact-bar a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
        }

        .contact-bar a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        /* Clock and Display Layouts */
        #clock {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        #time-left {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-main);
            text-align: center;
        }

        .stopwatch-display, .timer-display {
            font-size: 2.2rem;
            font-family: monospace;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.danger { background: var(--danger); }
        button.secondary { background: #6c757d; }

        .timer-inputs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .timer-inputs input {
            width: 60px;
            padding: 8px;
            text-align: center;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<!-- Blocks right-click contextual menus -->
<body oncontextmenu="return false;">

    <!-- Top Line Info Bar -->
    <div class="contact-bar">
        Need assistance? Contact via <a href="mailto:contact@kinren.in">email</a> .
    </div>

    <div class="container">
        <!-- 1. Current Time -->
        <div class="card">
            <h2>Current Time</h2>
            <div id="clock">00:00:00</div>
            <div id="clock-date" style="color: var(--text-muted); margin-top: 5px;"></div>
        </div>

        <!-- 2. Time Left Today -->
        <div class="card">
            <h2>Time Left Today</h2>
            <div id="time-left">00:00:00</div>
            <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Until midnight</div>
        </div>

        <!-- 3. Stopwatch -->
        <div class="card">
            <h2>Stopwatch</h2>
            <div class="stopwatch-display" id="stopwatch-display">00:00:00.00</div>
            <div class="controls">
                <button id="sw-start">Start</button>
                <button id="sw-pause" class="secondary">Pause</button>
                <button id="sw-reset" class="danger">Reset</button>
            </div>
        </div>

        <!-- 4. Timer -->
        <div class="card">
            <h2>Timer</h2>
            <div class="timer-display" id="timer-display">00:00:00</div>
            <div class="timer-inputs" id="timer-inputs">
                <input type="number" id="t-hours" placeholder="HH" min="0" max="99">
                <input type="number" id="t-minutes" placeholder="MM" min="0" max="59">
                <input type="number" id="t-seconds" placeholder="SS" min="0" max="59">
            </div>
            <div class="controls">
                <button id="t-start">Start</button>
                <button id="t-pause" class="secondary">Pause</button>
                <button id="t-reset" class="danger">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CURRENT TIME ---
        const clockElement = document.getElementById('clock');
        const dateElement = document.getElementById('clock-date');
        setInterval(() => {
            const now = new Date();
            clockElement.innerText = now.toLocaleTimeString();
            dateElement.innerText = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
        }, 1000);

        // --- 2. TIME LEFT TODAY ---
        const timeLeftElement = document.getElementById('time-left');
        setInterval(() => {
            const now = new Date();
            const midnight = new Date();
            midnight.setHours(24, 0, 0, 0);
            const diff = midnight - now;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timeLeftElement.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }, 1000);

        // --- 3. STOPWATCH ---
        let swTimer; let swElapsed = 0; let swRunning = false;
        const swDisplay = document.getElementById('stopwatch-display');

        function updateSWDisplay() {
            const ms = Math.floor((swElapsed % 1000) / 10);
            const secs = Math.floor((swElapsed / 1000) % 60);
            const mins = Math.floor((swElapsed / (1000 * 60)) % 60);
            const hrs = Math.floor(swElapsed / (1000 * 60 * 60));
            swDisplay.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }

        document.getElementById('sw-start').addEventListener('click', () => {
            if (!swRunning) {
                swRunning = true;
                const start = Date.now() - swElapsed;
                swTimer = setInterval(() => { swElapsed = Date.now() - start; updateSWDisplay(); }, 10);
            }
        });

        document.getElementById('sw-pause').addEventListener('click', () => { clearInterval(swTimer); swRunning = false; });
        document.getElementById('sw-reset').addEventListener('click', () => { clearInterval(swTimer); swRunning = false; swElapsed = 0; updateSWDisplay(); });

        // --- 4. TIMER ---
        let tTimer; let tTotalSeconds = 0; let tRunning = false;
        const tDisplay = document.getElementById('timer-display');

        function updateTDisplay() {
            const hrs = Math.floor(tTotalSeconds / 3600);
            const mins = Math.floor((tTotalSeconds % 3600) / 60);
            const secs = tTotalSeconds % 60;
            tDisplay.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            if (tTotalSeconds <= 0 && tRunning) { clearInterval(tTimer); tRunning = false; alert("Time's up!"); }
        }

        document.getElementById('t-start').addEventListener('click', () => {
            if (!tRunning) {
                const h = parseInt(document.getElementById('t-hours').value) || 0;
                const m = parseInt(document.getElementById('t-minutes').value) || 0;
                const s = parseInt(document.getElementById('t-seconds').value) || 0;
                
                // If paused, resume from remaining time; otherwise set new inputs
                if (tTotalSeconds <= 0) {
                    tTotalSeconds = (h * 3600) + (m * 60) + s;
                }
                if (tTotalSeconds <= 0) return;

                tRunning = true; updateTDisplay();
                tTimer = setInterval(() => { tTotalSeconds--; updateTDisplay(); }, 1000);
            }
        });

        document.getElementById('t-pause').addEventListener('click', () => { clearInterval(tTimer); tRunning = false; });
        document.getElementById('t-reset').addEventListener('click', () => {
            clearInterval(tTimer); tRunning = false; tTotalSeconds = 0; updateTDisplay();
            document.getElementById('t-hours').value = ''; document.getElementById('t-minutes').value = ''; document.getElementById('t-seconds').value = '';
        });
    </script>
</body>
</html>
