<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #11111b);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a5a5b1;
            margin-bottom: 10px;
        }

        .display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            font-weight: bold;
            color: #4ef0ff;
            text-shadow: 0 0 10px rgba(78, 240, 255, 0.3);
            margin-bottom: 40px;
        }

        .display:last-child {
            margin-bottom: 0;
            color: #ff4e79;
            text-shadow: 0 0 10px rgba(255, 78, 121, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Current Time</h2>
        <div id="current-time" class="display">00:00:00</div>

        <h2>Time Left Today</h2>
        <div id="countdown" class="display">00:00:00</div>
    </div>

    <script>
        function updateClockAndTimer() {
            const now = new Date();

            // 1. Format and display current time
            const curHours = String(now.getHours()).padStart(2, '0');
            const curMinutes = String(now.getMinutes()).padStart(2, '0');
            const curSeconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${curHours}:${curMinutes}:${curSeconds}`;

            // 2. Set the end of the day target (23:59:59:999)
            const endOfDay = new Date();
            endOfDay.setHours(23, 59, 59, 999);

            // 3. Calculate remaining time
            const timeDiff = endOfDay - now;

            if (timeDiff <= 0) {
                document.getElementById('countdown').textContent = "00:00:00";
                return;
            }

            // Convert remaining milliseconds to hours, minutes, and seconds
            const hoursLeft = Math.floor((timeDiff / (1000 * 60 * 60)) % 24);
            const minutesLeft = Math.floor((timeDiff / (1000 * 60)) % 60);
            const secondsLeft = Math.floor((timeDiff / 1000) % 60);

            // Pad single digits with leading zeros
            const displayHours = String(hoursLeft).padStart(2, '0');
            const displayMinutes = String(minutesLeft).padStart(2, '0');
            const displaySeconds = String(secondsLeft).padStart(2, '0');

            document.getElementById('countdown').textContent = `${displayHours}:${displayMinutes}:${displaySeconds}`;
        }

        // Run immediately on page load, then refresh every 1 second
        updateClockAndTimer();
        setInterval(updateClockAndTimer, 1000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Stopwatch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            align: bottom;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a;
            color: #ffffff;
        }

        .stopwatch-container {
            text-align: center;
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 350px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .display {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
            background: #0f172a;
            padding: 1rem 0;
            border-radius: 10px;
            margin-bottom: 2rem;
            color: #f8fafc;
            border: 2px solid #334155;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
        }

        #startBtn { background-color: #22c55e; }
        #startBtn:hover { background-color: #16a34a; }

        #stopBtn { background-color: #ef4444; }
        #stopBtn:hover { background-color: #dc2626; }

        #resetBtn { background-color: #64748b; }
        #resetBtn:hover { background-color: #475569; }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="stopwatch-container">
        <h1>STOPWATCH</h1>
        <div class="display" id="display">00:00:00</div>
        <div class="controls">
            <button id="startBtn" onclick="start()">Start</button>
            <button id="stopBtn" onclick="stop()">Stop</button>
            <button id="resetBtn" onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        let timer = null;
        let startTime = 0;
        let elapsedTime = 0;
        let isRunning = false;

        const display = document.getElementById("display");

        function start() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timer = setInterval(update, 10);
                isRunning = true;
            }
        }

        function stop() {
            if (isRunning) {
                clearInterval(timer);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
            }
        }

        function reset() {
            clearInterval(timer);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            display.textContent = "00:00:00";
        }

        function update() {
            const currentTime = Date.now();
            elapsedTime = currentTime - startTime;

            let minutes = Math.floor((elapsedTime / (1000 * 60)) % 60);
            let seconds = Math.floor((elapsedTime / 1000) % 60);
            let milliseconds = Math.floor((elapsedTime % 1000) / 10);

            minutes = String(minutes).padStart(2, "0");
            seconds = String(seconds).padStart(2, "0");
            milliseconds = String(milliseconds).padStart(2, "0");

            display.textContent = `${minutes}:${seconds}:${milliseconds}`;
        }
    </script>

</body>
</html>
